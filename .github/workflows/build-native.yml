name: Build Native Portable EXE

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '8.0.x'

      - name: Restore workloads
        run: |
          cd LoFiLearn/LoFiLearn.App
          dotnet workload restore

      - name: Publish portable EXE
        run: |
          cd LoFiLearn/LoFiLearn.App
          dotnet publish -c Release -r win-x64 --self-contained true -p:PublishSingleFile=true -p:IncludeNativeLibrariesForSelfExtract=true

      - name: Upload EXE artifact
        uses: actions/upload-artifact@v5
        with:
          name: LoFiLearn-Native-Portable
          path: LoFiLearn/LoFiLearn.App/bin/Release/net8.0-windows10.0.19041.0/win-x64/publish/LoFiLearn.exe